[pytest]
asyncio_mode = strict
asyncio_default_fixture_loop_scope = function
markers =
    asyncio: async tests (pytest-asyncio)
    rag: optional tests that require RAG-specific dependencies such as chromadb
    startup_isolation: subprocess startup tests that must run outside the main backend pytest session
filterwarnings =
    error:Using `httpx` with `starlette.testclient` is deprecated.*:DeprecationWarning
    error:unclosed database in <sqlite3\.Connection object.*:ResourceWarning
