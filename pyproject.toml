[tool.ruff]
line-length = 100
target-version = "py311"
exclude = [
  "frontend/dist",
  "frontend/node_modules",
]

[tool.ruff.lint]
select = [
  "E",
  "F",
  "I",
]
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
"backend/tests/*.py" = []

[tool.mypy]
python_version = "3.11"
files = ["backend"]
mypy_path = [".", "backend"]
exclude = [
  "^backend/tests/",
]
warn_unused_configs = true
warn_redundant_casts = true
warn_unused_ignores = true
no_implicit_optional = true
check_untyped_defs = true
pretty = true

[[tool.mypy.overrides]]
module = [
  "apscheduler.*",
  "pandas",
  "pytz",
  "reportlab.*",
]
ignore_missing_imports = true

[tool.coverage.run]
branch = true
source = ["backend"]
omit = [
  "backend/main.py",
  "backend/migrations/*",
  "backend/version.py",
]

[tool.coverage.report]
show_missing = true
skip_covered = false
omit = [
  "backend/main.py",
  "backend/migrations/*",
  "backend/version.py",
]

[tool.coverage.html]
directory = "coverage/backend/html"

[tool.coverage.xml]
output = "coverage/backend/coverage.xml"

[tool.coverage.json]
output = "coverage/backend/coverage.json"
